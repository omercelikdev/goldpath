name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: build
        run: dotnet build Goldpath.sln --nologo
      - name: unit tests
        run: |
          set -e
          for p in tests/*/; do
            n=$(basename "$p")
            if [ "$n" != "Goldpath.IntegrationTests" ] && [ "$n" != "Goldpath.Jobs.TestHost" ] && [ -f "$p/$n.csproj" ]; then
              dotnet test "$p/$n.csproj" --no-build --nologo
            fi
          done
      - name: format
        run: dotnet format Goldpath.sln --verify-no-changes
      - name: license gate (free/OSS only)
        run: python3 scripts/license-gate.py

  # Public repo: Actions minutes are free and ubuntu-latest ships Docker — the heavy
  # proofs run HERE now (the GitLab-era "register a runner" item died with the move).
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: integration proofs (real containers, benches excluded)
        run: |
          dotnet test tests/Goldpath.IntegrationTests/Goldpath.IntegrationTests.csproj \
            --filter "Category!=Bench" --nologo
        timeout-minutes: 45

  # The console kit (U1): component tests over the ui-standard-v1 contract.
  kit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ui/kit/pnpm-lock.yaml
      - name: kit tests
        working-directory: ui/kit
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm typecheck
