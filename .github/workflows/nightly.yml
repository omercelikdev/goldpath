# The heavy nightly proofs: the golden-manifest matrix + the full mutation gates.
# Public repo = free minutes; each shape/package is its own parallel job.
name: nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  gm:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GmOneAuthDefault
            args: ""
          - name: GmOneOpenFlow
            args: "--auth none"
          - name: GmFourSimple
            args: "--db sqlserver --broker none --auth none"
          # Dotted solution names are the .NET norm (Company.Product) — issue #24's regression shape.
          - name: Gm.Dotted
            args: "--broker none --auth none"
          - name: GmEverything
            args: "--features multitenancy --features audittrail --features softdelete --features idempotency --features dataprotection --features caching --features locking --features archival --features bulk --features notification --features campaign --auth none"
          - name: GmWorkerQueue
            args: ""
            template: goldpath-worker
          - name: GmWorkerSchedule
            args: "--trigger schedule"
            template: goldpath-worker
          - name: GmWorkerJobs
            args: "--trigger jobs"
            template: goldpath-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: ${{ matrix.name }}
        env:
          GOLDPATH_GM_TEMPLATE: ${{ matrix.template || 'goldpath-solution' }}
        run: ./scripts/validate-gm.sh "${{ matrix.name }}" ${{ matrix.args }}

  migrations-proofs:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: the three D7 proofs (H1 evidence, kept green forever)
        run: ./scripts/validate-migrations.sh

  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        # The hosted-fit ten (issue #20): the six long-running packages OOM the 16 GB
        # runners even at concurrency 2 — they live in mutation-heavy.yml (dispatch-only)
        # and in the release checklist's local cadence.
        package: [Goldpath.Abstractions, Goldpath.Data, Goldpath.Idempotency, Goldpath.AuditTrail,
                  Goldpath.SoftDelete, Goldpath.DataProtection, Goldpath.MultiTenancy,
                  Goldpath.Locking, Goldpath.Auth, Goldpath.Cli]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - run: dotnet tool restore
      - name: mutation gate (concurrency capped — hosted runners are 4 vCPU / 16 GB)
        env:
          GOLDPATH_MUTATION_CONCURRENCY: "2"
        run: bash scripts/mutation-gate.sh "${{ matrix.package }}"

  # The finance sample stays green forever: built against the PUBLISHED packages, its
  # unit contract tests and the real-AppHost smoke run nightly (samples/GAP-LEDGER.md
  # is this job's product when it goes red).
  # The deterministic half of the eval harness: acceptance runners are portable and
  # green against committed artifacts. The LLM half (running the skills themselves)
  # stays deferred until an agent-in-CI story exists (foundation §12 / skills RFC).
  evals-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: pin the engine (published tool, not a checkout)
        run: dotnet tool install -g specdrift --version 0.4.1
      - name: runner syntax holds
        run: for f in evals/skills/*/accept.sh; do bash -n "$f"; done
      - name: breaker acceptance vs CorPay
        run: bash evals/skills/breaker/accept.sh samples/corpay

  sample-corpay:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: build + unit contracts
        working-directory: samples/corpay
        run: |
          dotnet build CorPay.sln --nologo
          dotnet test tests/CorPay.Api.Tests/CorPay.Api.Tests.csproj --no-build --nologo
      - name: smoke (real AppHost + containers)
        working-directory: samples/corpay
        run: dotnet test tests/CorPay.SmokeTests/CorPay.SmokeTests.csproj --no-build --nologo
        timeout-minutes: 20
