# Single source of truth (Goldpath ADR-0001). Validates against schemas/manifest/v1.
schemaVersion: 1
kind: solution
name: CorPay
description: Golden-path solution generated by dotnet new goldpath-solution
owner: team-corpay
architecture:
  deploymentModel: modular-monolith
  codeOrg: vertical-slice
providers:
  db: postgresql
  cache: redis
  broker: rabbitmq
  auth: openid
features:
  outbox: true
  multiTenancy: true
  auditTrail: true
  softDelete: true
  idempotency: true
  dataProtection: true
  distributedCaching: true
  distributedLocking:
    provider: postgres
    connectionName: ordersdb
  archival: true
  bulk: true
