# Generated by goldpath-solution. The full Goldpath test cycle (central ci-templates include) arrives
# with the ci-templates publication; until then: build + tests on every MR.
image: mcr.microsoft.com/dotnet/sdk:10.0

default:
  tags: [docker-runner]

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages: [build, test]

build:
  stage: build
  script:
    - dotnet build -c Release

test:
  stage: test
  script:
    - dotnet test -c Release
