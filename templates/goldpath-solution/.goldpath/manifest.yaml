# Single source of truth (Goldpath ADR-0001). Validates against schemas/manifest/v1.
schemaVersion: 1
kind: solution
name: GoldpathTemplate
description: Golden-path solution generated by dotnet new goldpath-solution
owner: team-GoldpathTplOwner
architecture:
  deploymentModel: modular-monolith
  codeOrg: vertical-slice
providers:
  db: GOLDPATH-DB
  cache: redis
  broker: GOLDPATH-BROKER
  auth: GOLDPATH-AUTH
#if (UseBroker || UseMultiTenancy || UseAuditTrail || UseSoftDelete || UseIdempotency || UseDataProtection || UseCaching || UseLocking || UseArchival || UseBulk || UseNotification || UseCampaign)
features:
#endif
#if (UseBroker)
  outbox: true
#endif
#if (UseMultiTenancy)
  multiTenancy: true
#endif
#if (UseAuditTrail)
  auditTrail: true
#endif
#if (UseSoftDelete)
  softDelete: true
#endif
#if (UseIdempotency)
  idempotency: true
#endif
#if (UseDataProtection)
  dataProtection: true
#endif
#if (UseCaching)
  distributedCaching: true
#endif
#if (UseLocking && UsePostgres)
  distributedLocking:
    provider: postgres
    connectionName: ordersdb
#endif
#if (UseLocking && UseSqlServer)
  distributedLocking:
    provider: sqlserver
    connectionName: ordersdb
#endif
#if (UseArchival)
  archival: true
#endif
#if (UseBulk)
  bulk: true
#endif
#if (UseNotification)
  notification: true
#endif
#if (UseCampaign)
  campaign: true
#endif
