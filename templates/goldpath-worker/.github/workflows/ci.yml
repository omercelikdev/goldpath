# Generated by goldpath-worker: build + tests + the schema-lifecycle gates on every PR.
# The migration BUNDLE is the production apply mechanism (migrations runbook): deployment
# runs the artifact BEFORE the new app version starts — the app process never holds DDL.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: build
        run: dotnet build -c Release --nologo
      - name: tests
        run: dotnet test -c Release --no-build --nologo
      - name: migrations match the model (goldpath db status)
        run: |
          dotnet tool restore
          for proj in $(grep -rl "Microsoft.EntityFrameworkCore.Design" src --include="*.csproj"); do
            dotnet ef migrations has-pending-model-changes --project "$proj" --startup-project "$proj"
          done
      - name: migration bundles (the production apply artifact)
        run: |
          mkdir -p artifacts/migrations
          for proj in $(grep -rl "Microsoft.EntityFrameworkCore.Design" src --include="*.csproj"); do
            name=$(basename "$proj" .csproj)
            dotnet ef migrations bundle --force --project "$proj" --startup-project "$proj" \
              --output "artifacts/migrations/$name-migrations"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: migration-bundles
          path: artifacts/migrations/
