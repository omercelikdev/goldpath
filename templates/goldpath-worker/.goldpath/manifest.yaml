# Single source of truth (Goldpath ADR-0001). Validates against schemas/manifest/v1.
# Worker manifests are LEAN by schema design: no providers/features here — infrastructure
# is declared once, in the owning solution's manifest.
schemaVersion: 1
kind: worker
name: GoldpathWorker
description: Goldpath worker generated by dotnet new goldpath-worker
owner: team-goldpathworker
#if (UseQueue)
workerType: consumer-rabbitmq
trigger:
  queue: work-item-queued   # MassTransit kebab-case endpoint (consumer name minus "Consumer")
#endif
#if (UseJobs)
workerType: scheduler-quartz
trigger:
  cron: "0 0 1 * * ?"   # Quartz cron; runtime reschedule is an audited admin verb (RFC D7)
#endif
#if (UseSchedule)
# Plain interval batch: BCL PeriodicTimer, cadence in configuration (Worker:Interval).
# A cron trigger arrives with the Ring C Jobs module — declaring one here would be a lie.
workerType: batch
#endif
